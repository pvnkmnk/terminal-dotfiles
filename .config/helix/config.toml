# .config/helix/config.toml
# Helix editor configuration
# Theme aligned to Catppuccin Mocha (matches WezTerm + Zellij theme)

theme = "catppuccin_mocha"

[editor]
line-number = "relative"
mouse = true
auto-save = true
completion-trigger-len = 1
color-modes = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.statusline]
left = ["mode", "spinner", "file-name"]
center = []
right = ["diagnostics", "selections", "position", "file-encoding", "file-type"]

[editor.lsp]
display-messages = true

[keys.normal]
# Quick save
"C-s" = ":w"
# g-prefixed pickers avoid shadowing built-in motion keys
# g+f = file picker, g+b = buffer picker
"g" = { f = "file_picker", b = "buffer_picker" }
