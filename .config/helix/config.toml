# .config/helix/config.toml
# Helix editor configuration

theme = "gruvbox"

[editor]
line-number = "relative"
mouse = true
auto-save = true
completion-trigger-len = 1
color-modes = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.statusline]
left = ["mode", "spinner", "file-name"]
center = []
right = ["diagnostics", "selections", "position", "file-encoding", "file-type"]

[editor.lsp]
display-messages = true

[keys.normal]
"C-s" = ":w"
"C-p" = "file_picker"
"C-b" = "buffer_picker"
