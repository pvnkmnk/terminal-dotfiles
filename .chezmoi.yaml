# .chezmoi.yaml
# chezmoi source directory config
# Maps this repo's files to their target destinations
# See: https://www.chezmoi.io/reference/configuration-file/

sourceDir: .

# Destination mapping:
# .config/wezterm/wezterm.lua   -> ~/.config/wezterm/wezterm.lua
# .config/zellij/               -> ~/.config/zellij/
# .config/helix/                -> ~/.config/helix/
# .config/television/           -> ~/.config/television/
# powershell/profile.ps1        -> ~/Documents/PowerShell/Microsoft.PowerShell_profile.ps1
#
# To apply:
#   chezmoi init --apply https://github.com/pvnkmnk/terminal-dotfiles.git
#
# Or if already cloned:
#   chezmoi apply

# Ignore install script and docs from chezmoi management
ignore:
  - install.ps1
  - README.md
  - .gitignore
