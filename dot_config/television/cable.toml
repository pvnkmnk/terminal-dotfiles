# dot_config/television/cable.toml
# Television custom channel definitions
# Destination: ~/.config/television/cable.toml
#
# PATH RULE:
#   ~/projects        = WSL ext4 — primary dev, full native I/O
#   ~/vault-memory    = WSL ext4 — agent memory on Linux side
#   /mnt/c/...        = Windows NTFS — read-only reference only

# ── Project discovery ────────────────────────────────────────────
[[channels]]
name    = "git-repos"
# Searches ~/projects on WSL ext4 — NOT /mnt/c
command = "fd -t d -H .git ~/projects --max-depth 3 | sed 's/\/.git//'"
preview = "ls -la {}"

# ── Vault / knowledge base ────────────────────────────────────────
[[channels]]
name    = "vault-memory"
# vault-memory cloned onto WSL ext4 via bootstrap script
command = "fd -t f . ~/vault-memory --exclude .git"
preview = "bat --color=always {}"

# ── Environment variables (filtered) ─────────────────────────────
[[channels]]
# Filtered to avoid leaking secrets
name    = "env-vars"
command = "env | grep -Ev '(KEY|TOKEN|SECRET|PASSWORD|PASS|CREDENTIALS|AUTH)'"
preview = "echo {}"

# ── Docker ──────────────────────────────────────────────────────────
[[channels]]
name    = "docker-containers"
command = "docker ps --format '{{.Names}}'"
# Scoped preview: status + ports only (avoids verbose inspect output)
preview = "docker inspect {} | jq '.[0] | {Status: .State.Status, Ports: .NetworkSettings.Ports}'"

[[channels]]
name    = "docker-images"
command = "docker images --format '{{.Repository}}:{{.Tag}}'"
preview = "docker inspect {} | jq '.[0] | {Created: .Created, Size: .Size}'"

# ── lazydocker TUI launcher ─────────────────────────────────────────
[[channels]]
name    = "lazydocker"
command = "docker ps --format '{{.Names}}'"
preview = "docker stats {} --no-stream --format 'CPU: {{.CPUPerc}}  MEM: {{.MemUsage}}'"

# ── Extra channels (folded in from upgrade_refactor_report.md) ──────
[[channels]]
name = "git-branches"
command = "git branch --all --format='%(refname:short)'"
preview = "git log --oneline --graph --color=always '{}' | head -200"

[[channels]]
name = "tldr"
command = "tldr --list"
preview = "tldr --color always '{}'"

[[channels]]
name = "recent-files"
command = "fd -t f --changed-within 7d ."
preview = "bat --color=always '{}'"
