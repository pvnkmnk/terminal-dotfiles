# .chezmoiexternal.toml
# Fetches Zellij plugin binaries on chezmoi apply
# Pinned to explicit versions — never float on "latest"

["dot_config/zellij/plugins/zjstatus.wasm"]
    type          = "file"
    url           = "https://github.com/dj95/zjstatus/releases/download/v0.19.1/zjstatus.wasm"
    executable    = false
    refreshPeriod = "168h"
